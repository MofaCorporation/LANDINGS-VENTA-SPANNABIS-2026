# MySQL local para desarrollo (PHP/Apache: Laragon, Docker propio o servidor del host).
# Cuando añadas un servicio web, el DocumentRoot debe apuntar a /public (ver estructura-proyecto.md).

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: app
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: rootchangeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
