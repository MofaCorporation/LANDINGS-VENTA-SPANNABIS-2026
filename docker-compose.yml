# Desarrollo local: PHP 8.2 + Apache (DocumentRoot /public) y MySQL 8.
# Uso: docker compose up -d
# Web: http://localhost:8080  (ajusta el puerto en "ports" si 8080 está ocupado)

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      BASE_URL: http://localhost:8080
      DB_HOST: db
      DB_NAME: ecommerce
      DB_USER: app
      DB_PASS: changeme
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: app
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: rootchangeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
